<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slibrary Sheet · BCOBM214</title>
<meta name="description" content="Standalone printable Slibrary sheet for any BCOBM214 framework or author — designed to print cleanly as a single A4 PDF.">
<style>
/* Self-contained styles — this page renders a clean printable sheet
   regardless of the rest of the site's CSS. Designed to print as A4. */

:root {
  --emerald: #155e4a;
  --emerald-2: #1e7a60;
  --gold: #b8893a;
  --ink: #0f1a17;
  --ink-soft: #2a3936;
  --muted: #6b7c78;
  --muted-soft: #9aa8a4;
  --line: #d9dedc;
  --line-soft: #ecefee;
  --paper-tint: #f5f3ec;
  --card: #ffffff;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: #f5f3ec; color: var(--ink); font-family: Arial, Helvetica, sans-serif; -webkit-font-smoothing: antialiased; }

/* Top toolbar (hidden when printing) */
.toolbar {
  background: #fff; border-bottom: 1px solid var(--line);
  padding: 12px 28px;
  display: flex; align-items: center; justify-content: space-between; gap: 14px;
  position: sticky; top: 0; z-index: 20;
}
.toolbar .left { font-weight: 600; color: var(--ink); }
.toolbar .left small { color: var(--muted); font-style: italic; margin-left: 6px; font-weight: 400; }
.toolbar .right { display: flex; gap: 10px; }
.btn {
  font-family: Arial; font-size: .9rem; font-weight: 600;
  padding: 9px 16px; border-radius: 8px; border: 1px solid var(--line);
  background: #fff; color: var(--ink-soft); cursor: pointer; text-decoration: none;
  display: inline-block;
}
.btn:hover { border-color: var(--emerald-2); color: var(--emerald); }
.btn.primary { background: var(--emerald); border-color: var(--emerald); color: #fff; }
.btn.primary:hover { background: var(--emerald-2); border-color: var(--emerald-2); color: #fff; }

/* Sheet centred on page */
.sheet-wrap {
  max-width: 880px; margin: 24px auto; padding: 0 16px 60px;
}

/* The sheet itself — designed to print as a single A4 page */
.sheet {
  background: #fff;
  border-radius: 10px;
  border: 1px solid var(--line);
  box-shadow: 0 8px 32px rgba(15,26,23,.08);
  overflow: hidden;
}

/* Top emerald bar */
.bar {
  background: var(--emerald); color: #fff;
  padding: 10px 28px;
  display: flex; justify-content: space-between; align-items: center;
  font-size: .72rem; letter-spacing: .12em; text-transform: uppercase; font-weight: 600;
}
.bar .left { color: rgba(255,255,255,.85); }

/* Title row */
.title-row {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 22px 36px 6px; gap: 18px;
}
.title-row h1 {
  font-family: Arial; margin: 0;
  font-size: 1.65rem; line-height: 1.15; font-weight: 700; color: var(--ink);
}
.sheet-num {
  font-size: .72rem; letter-spacing: .14em; text-transform: uppercase;
  color: var(--muted); white-space: nowrap;
  padding-top: 6px; font-weight: 600;
}
.subtitle {
  padding: 0 36px 18px;
  font-style: italic; color: var(--ink-soft);
  font-size: .98rem;
  border-bottom: 1px solid var(--line);
  margin: 0;
}

/* Body */
.body { padding: 18px 36px 22px; }

.h3 {
  font-family: Arial; font-size: .68rem; letter-spacing: .14em; text-transform: uppercase;
  color: var(--emerald); margin: 0 0 6px; font-weight: 700;
}
.box {
  background: rgba(21,94,74,.06);
  border-left: 3px solid var(--emerald);
  padding: 12px 16px; border-radius: 0 6px 6px 0; margin-bottom: 18px;
}
.box .h3 { margin-bottom: 4px; }
.box p { margin: 0; font-size: .92rem; line-height: 1.55; color: var(--ink-soft); }

.col-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; margin-bottom: 18px; }
.col-2 h4 { font-family: Arial; font-size: .72rem; letter-spacing: .14em; text-transform: uppercase; color: var(--emerald); margin: 0 0 4px; font-weight: 700; }
.col-2 p { margin: 0 0 10px; font-size: .9rem; line-height: 1.55; color: var(--ink-soft); }

.col-3 {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px;
  margin-bottom: 18px; padding: 12px 0;
  border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
}
.col-3 h4 { font-family: Arial; font-size: .68rem; letter-spacing: .14em; text-transform: uppercase; color: var(--emerald); margin: 0 0 4px; font-weight: 700; }
.col-3 p { margin: 0; font-size: .85rem; line-height: 1.5; color: var(--ink-soft); }

.figure {
  background: #fff; border: 1px solid var(--line);
  border-radius: 6px; padding: 14px 16px;
  font-size: .85rem; color: var(--muted);
}
.figure .h3 { color: var(--gold); margin-bottom: 8px; font-size: .65rem; }
.figure svg { width: 100%; height: auto; max-height: 180px; }
.figure .caption { margin: 8px 0 0; font-size: .8rem; font-style: italic; color: var(--muted); line-height: 1.4; }

.pills { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 0 14px; }
.pill {
  font-size: .72rem; padding: 4px 10px; border-radius: 100px;
  background: #fff; border: 1px solid var(--line);
  color: var(--ink-soft); font-weight: 600; letter-spacing: .02em;
}
.pill em { font-style: italic; color: var(--muted); margin-left: 6px; font-weight: 400; }

.sources { font-size: .78rem; line-height: 1.5; color: var(--muted); padding-top: 8px; }
.sources p { margin: 0 0 4px; }

.footer-bar {
  background: var(--emerald); color: rgba(255,255,255,.95);
  padding: 8px 28px;
  display: flex; justify-content: space-between; align-items: center;
  font-size: .68rem; letter-spacing: .08em;
}

.author-cm {
  font-style: italic; font-size: 1rem; color: var(--ink);
  border-left: 3px solid var(--gold);
  padding: 8px 14px; margin: 0 0 18px;
  background: rgba(184,137,58,.05); border-radius: 0 6px 6px 0;
}
.author-cm::before {
  content: "Core message"; display: block;
  font-size: .65rem; letter-spacing: .14em; text-transform: uppercase;
  color: var(--gold); font-style: normal; margin-bottom: 4px; font-weight: 700;
}

ol, ul { padding-left: 22px; margin: 0 0 1em; color: var(--ink-soft); }
ol li, ul li { margin-bottom: 6px; line-height: 1.55; font-size: .9rem; }

.error {
  padding: 60px 32px; text-align: center; color: var(--muted);
  background: #fff; border: 1px solid var(--line); border-radius: 10px;
}
.error h2 { font-family: Arial; color: var(--ink); }

/* Print rules — hide chrome, print only the sheet */
@media print {
  @page { margin: 12mm; size: A4 portrait; }
  html, body { background: #fff !important; }
  .toolbar { display: none !important; }
  .sheet-wrap { max-width: none !important; margin: 0 !important; padding: 0 !important; }
  .sheet { box-shadow: none !important; border: none !important; border-radius: 0 !important; overflow: visible; }
}
</style>
</head>
<body>

<div class="toolbar">
  <div class="left">BCOBM214 <small>Slibrary Sheet</small></div>
  <div class="right">
    <a class="btn" href="index.html">← Course</a>
    <a class="btn" href="all-frameworks.html">Slibrary Wall</a>
    <a class="btn" href="slibrary.html">Authors</a>
    <button class="btn primary" id="print-btn" type="button">Print as PDF</button>
  </div>
</div>

<div class="sheet-wrap">
  <article class="sheet" id="sheet">
    <div class="error">
      <h2>Loading Slibrary sheet…</h2>
      <p>If this message persists, the URL hash may be missing or invalid. Try one of these examples:</p>
      <p style="margin-top:14px;"><a href="sheet.html#F1">sheet.html#F1</a> · <a href="sheet.html#A-sarasvathy">sheet.html#A-sarasvathy</a></p>
    </div>
  </article>
</div>

<script src="assets/frameworks.js"></script>
<script src="assets/authors.js"></script>
<script>
(function () {
  'use strict';

  var UNIT_TITLES = {
    1:"Introduction to Entrepreneurship & BD",
    2:"Identifying & Testing a Business Idea",
    3:"Market Research & Opportunity Identification",
    4:"Business Planning & Strategy",
    5:"Developing the Business Plan",
    6:"Intrapreneurship & Corporate Business Development",
    7:"Growth Management & Strategies",
    8:"Funding & Financial Strategies",
    9:"Pitching & Presentation Skills",
    10:"Finalizing & Presenting the Business Plan"
  };
  var SLIBRARY_TITLES = {
    1:"Defining Entrepreneurship & BD", 2:"Vision, Mission, Purpose & Goals",
    3:"Idea Viability & Proof of Concept", 4:"Product Development & Lifecycle",
    5:"Market Research Methods", 6:"Opportunity Identification",
    7:"Business Plan Components", 8:"Go-to-Market & Roadmap",
    9:"Plan Architecture", 10:"Pitfalls & Plan Quality",
    11:"Intrapreneurship", 12:"Innovation, BD & Leadership",
    13:"Growth Lifecycle", 14:"Growth Strategies",
    15:"Sources of Capital", 16:"Investment Stages & Terms",
    17:"Pitch Architecture", 18:"Delivery Craft",
    19:"Plan Evaluation", 20:"Iteration & Closing"
  };

  function escapeHtml(s) {
    if (s === undefined || s === null) return '';
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function findFramework(num) {
    var data = window.BCOBM214_FRAMEWORKS || [];
    var n = (num || '').trim().toUpperCase();
    for (var i = 0; i < data.length; i++) if (data[i].num === n) return data[i];
    return null;
  }
  function findAuthor(id) {
    var data = window.BCOBM214_AUTHORS || [];
    var i = (id || '').toLowerCase();
    for (var j = 0; j < data.length; j++) if (data[j].id === i) return data[j];
    return null;
  }

  function renderFramework(fw) {
    var slibTitle = SLIBRARY_TITLES[fw.slibrary] || '';
    var sheetIndex = ((parseInt(String(fw.num).replace(/[^0-9]/g,''), 10) - 1) % 4) + 1;
    var slibPad = ('0' + fw.slibrary).slice(-2);

    var profDef    = fw.professionalDefinition || fw.coreIdea || '';
    var whoDev     = fw.whoDeveloped || fw.author || '—';
    var whyDev     = fw.whyDeveloped || fw.whenToUse || '';
    var byWhom     = fw.byWhom || 'Founders, intrapreneurs, BD professionals, and BCOBM214 students.';
    var innovation = fw.innovation || fw.limitations || '';
    var figCap     = fw.figureCaption || 'Visual signature — replace with a bespoke diagram in a future revision.';

    var howList = (fw.howToApply || []).map(function (s) { return '<li>' + escapeHtml(s) + '</li>'; }).join('');

    var related = (fw.related || []).map(findFramework).filter(Boolean);
    var pillsHtml = related.map(function (r) {
      return '<a class="pill" href="sheet.html#' + escapeHtml(r.num) + '">' + escapeHtml(r.num) + ' ' + escapeHtml(r.title) + ' <em>· Slibrary ' + r.slibrary + '</em></a>';
    }).join('');

    var sourceList = fw.sourcesHarvard && fw.sourcesHarvard.length ? fw.sourcesHarvard : (fw.source ? [fw.source] : []);
    var sourcesHtml = sourceList.map(function (s) { return '<p>' + escapeHtml(s) + '</p>'; }).join('') || '<p>—</p>';

    var color = '#155e4a';
    var iconSvg =
      '<svg viewBox="0 0 220 130" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="0" width="220" height="130" fill="#fbfaf6"/>' +
      '<rect x="14" y="14" width="192" height="102" fill="none" stroke="' + color + '" stroke-width="1.4" rx="6"/>' +
      '<text x="110" y="58" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="' + color + '">' + escapeHtml(fw.num) + '</text>' +
      '<text x="110" y="82" text-anchor="middle" font-family="Arial" font-size="10" fill="' + color + '">Slibrary ' + fw.slibrary + ' · Unit ' + fw.unit + '</text></svg>';

    document.title = fw.num + ' · ' + fw.title + ' · BCOBM214 Slibrary Sheet';
    document.getElementById('sheet').innerHTML =
      '<div class="bar">' +
        '<span class="left">BCOBM214 · Entrepreneurship &amp; Business Development</span>' +
        '<span class="right">Unit ' + fw.unit + ' · Slibrary ' + fw.slibrary + ' — ' + escapeHtml(slibTitle) + '</span>' +
      '</div>' +
      '<div class="title-row">' +
        '<h1>' + escapeHtml(fw.title) + '</h1>' +
        '<span class="sheet-num">Slibrary ' + slibPad + ' · Sheet ' + sheetIndex + ' / 4</span>' +
      '</div>' +
      '<p class="subtitle">' + escapeHtml(fw.summary || '') + '</p>' +
      '<div class="body">' +
        '<div class="box"><div class="h3">Professional Definition</div><p>' + escapeHtml(profDef) + '</p></div>' +
        '<div class="col-2">' +
          '<div>' +
            '<h4>Who developed it</h4><p>' + escapeHtml(whoDev) + '</p>' +
            '<h4>Why it was developed</h4><p>' + escapeHtml(whyDev) + '</p>' +
          '</div>' +
          '<div class="figure">' +
            '<div class="h3">Figure 1 · ' + escapeHtml(fw.title) + '</div>' +
            iconSvg +
            '<p class="caption">' + escapeHtml(figCap) + '</p>' +
          '</div>' +
        '</div>' +
        '<div class="col-3">' +
          '<div><h4>How it is used</h4><ol>' + howList + '</ol></div>' +
          '<div><h4>When it is used</h4><p>' + escapeHtml(fw.whenToUse || '—') + '</p></div>' +
          '<div><h4>By whom it is used</h4><p>' + escapeHtml(byWhom) + '</p></div>' +
        '</div>' +
        '<div class="box"><div class="h3">Innovation relative to the predecessor tool</div><p>' + escapeHtml(innovation) + '</p></div>' +
        '<div class="h3">Related frameworks in this course</div>' +
        '<div class="pills">' + (pillsHtml || '<span class="pill">—</span>') + '</div>' +
        '<div class="h3">Sources (Harvard Referencing Style)</div>' +
        '<div class="sources">' + sourcesHtml + '</div>' +
      '</div>' +
      '<div class="footer-bar">' +
        '<span>BCOBM214 · Framework Sheet · Slibrary ' + slibPad + ' · ' + escapeHtml(fw.title) + '</span>' +
        '<span>Dr. Hildegard Haas · EU Business School · © 2026</span>' +
      '</div>';
  }

  function renderAuthor(a) {
    var fwPills = (a.frameworks || []).map(function (f) { return '<span class="pill">' + escapeHtml(f) + '</span>'; }).join('');

    document.title = a.name + ' · BCOBM214 Author Slibrary Sheet';
    document.getElementById('sheet').innerHTML =
      '<div class="bar">' +
        '<span class="left">BCOBM214 · Entrepreneurship &amp; Business Development</span>' +
        '<span class="right">Author Slibrary · ' + escapeHtml(a.discipline || '') + '</span>' +
      '</div>' +
      '<div class="title-row">' +
        '<h1>' + escapeHtml(a.name) + '</h1>' +
        '<span class="sheet-num">' + escapeHtml(a.years || '') + '</span>' +
      '</div>' +
      '<p class="subtitle">' + escapeHtml(a.role || '') + '</p>' +
      '<div class="body">' +
        '<p class="author-cm">' + escapeHtml(a.coreMessage || '') + '</p>' +
        '<div class="box"><div class="h3">Why this thinker matters</div><p>' + escapeHtml(a.why || '') + '</p></div>' +
        '<div class="col-2">' +
          '<div>' +
            '<h4>Foundation</h4><p>' + escapeHtml(a.foundation || '') + '</p>' +
            '<h4>Operationalisation</h4><p>' + escapeHtml(a.operationalisation || '') + '</p>' +
          '</div>' +
          '<div class="figure">' +
            '<div class="h3">Thumbnail · ' + escapeHtml(a.name) + '</div>' +
            (a.thumbnailSvg || '') +
            '<p class="caption">Visual signature in the JD Meier Thumbnail Thinking tradition.</p>' +
          '</div>' +
        '</div>' +
        '<div class="col-3">' +
          '<div><h4>Frameworks they anchor</h4><div style="font-size:.85rem">' + fwPills + '</div></div>' +
          '<div><h4>Limitations</h4><p>' + escapeHtml(a.limitations || '—') + '</p></div>' +
          '<div><h4>Enduring impact</h4><p>' + escapeHtml(a.enduring || '') + '</p></div>' +
        '</div>' +
        '<div class="box"><div class="h3">Where their thinking shows up in BCOBM214</div><p>' + escapeHtml(a.unitContext || '') + '</p></div>' +
        '<div class="h3">Sources (Harvard Referencing Style)</div>' +
        '<div class="sources">' +
          (a.sources || []).map(function (s) { return '<p>' + escapeHtml(s) + '</p>'; }).join('') +
        '</div>' +
      '</div>' +
      '<div class="footer-bar">' +
        '<span>BCOBM214 · Author Slibrary · ' + escapeHtml(a.name) + '</span>' +
        '<span>Dr. Hildegard Haas · EU Business School · © 2026</span>' +
      '</div>';
  }

  function renderError(message) {
    document.getElementById('sheet').innerHTML =
      '<div class="error"><h2>Sheet not found</h2><p>' + escapeHtml(message) + '</p>' +
      '<p style="margin-top:14px;"><a href="all-frameworks.html">Browse all frameworks</a> · <a href="slibrary.html">Browse all authors</a></p></div>';
  }

  function route() {
    var hash = (location.hash || '').replace(/^#/, '');
    if (!hash) {
      renderError('No item specified. Try sheet.html#F1 or sheet.html#A-sarasvathy.');
      return;
    }
    if (/^A-/i.test(hash)) {
      var aid = hash.replace(/^A-/i, '');
      var a = findAuthor(aid);
      if (a) renderAuthor(a);
      else renderError('Author "' + aid + '" not found.');
    } else {
      var fw = findFramework(hash);
      if (fw) renderFramework(fw);
      else renderError('Framework "' + hash + '" not found.');
    }
  }

  // Wire the print button
  document.getElementById('print-btn').addEventListener('click', function () {
    window.print();
  });

  // Initial route
  function attempt() {
    if (window.BCOBM214_FRAMEWORKS && window.BCOBM214_AUTHORS) { route(); return; }
    setTimeout(attempt, 50);
  }
  attempt();

  // Re-route on hash change
  window.addEventListener('hashchange', route);
})();
</script>

</body>
</html>
